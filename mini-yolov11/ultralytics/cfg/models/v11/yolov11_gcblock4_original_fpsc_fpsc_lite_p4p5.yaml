# YOLO11n + GCBlock(P2/P3/P4/P5) + original FPSC replacing SPPF
# + FeaturePyramidSharedConvLite at P4/P5 in the PAN neck.

nc: 5
scales:
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

backbone:
  - [-1, 1, Conv, [64, 3, 2]]
  - [-1, 1, Conv, [128, 3, 2]]
  - [-1, 2, C3k2, [256, False, 0.25]]
  - [-1, 1, GCBlock, [256]]
  - [-1, 1, Conv, [256, 3, 2]]
  - [-1, 2, C3k2, [512, False, 0.25]]
  - [-1, 1, GCBlock, [512]]
  - [-1, 1, Conv, [512, 3, 2]]
  - [-1, 2, C3k2, [512, True]]
  - [-1, 1, GCBlock, [512]]
  - [-1, 1, Conv, [1024, 3, 2]]
  - [-1, 2, C3k2, [1024, True]]
  - [-1, 1, GCBlock, [1024]]
  - [-1, 1, FeaturePyramidSharedConv, [1024, 0.25, [1, 3, 5]]]
  - [-1, 2, C2PSA, [1024]]

head:
