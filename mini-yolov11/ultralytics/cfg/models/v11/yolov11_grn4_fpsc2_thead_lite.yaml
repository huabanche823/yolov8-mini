# YOLO11n + GRN4 backbone + original SPPF
# + paper-style FeaturePyramidSharedConv at P4/P5 in the PAN neck + T-Head-Lite Detect.

nc: 5
scales:
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

backbone:
  - [-1, 1, Conv, [64, 3, 2]] # 0-P1/2
  - [-1, 1, Conv, [128, 3, 2]] # 1-P2/4
  - [-1, 2, C3k2, [256, False, 0.25]] # 2-P2/4
  - [-1, 1, GRNBlock, [256]] # 3-GRN-P2
  - [-1, 1, Conv, [256, 3, 2]] # 4-P3/8
  - [-1, 2, C3k2, [512, False, 0.25]] # 5-P3/8
  - [-1, 1, GRNBlock, [512]] # 6-GRN-P3
  - [-1, 1, Conv, [512, 3, 2]] # 7-P4/16
  - [-1, 2, C3k2, [512, True]] # 8-P4/16
  - [-1, 1, GRNBlock, [512]] # 9-GRN-P4
  - [-1, 1, Conv, [1024, 3, 2]] # 10-P5/32
  - [-1, 2, C3k2, [1024, True]] # 11-P5/32
  - [-1, 1, GRNBlock, [1024]] # 12-GRN-P5
  - [-1, 1, SPPF, [1024, 5]] # 13
  - [-1, 2, C2PSA, [1024]] # 14-P5/32

head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 9], 1, Concat, [1]] # cat GRN-P4
  - [-1, 2, C3k2, [512, False]] # 17

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 6], 1, Concat, [1]] # cat GRN-P3
  - [-1, 2, C3k2, [256, False]] # 20-P3/8

  - [-1, 1, Conv, [256, 3, 2]]
  - [[-1, 17], 1, Concat, [1]]
  - [-1, 1, FeaturePyramidSharedConv, [512, 0.25, [1, 3, 5]]] # 23-P4/16

  - [-1, 1, Conv, [512, 3, 2]]
  - [[-1, 14], 1, Concat, [1]]
  - [-1, 1, FeaturePyramidSharedConv, [1024, 0.25, [1, 3, 5]]] # 26-P5/32

  # TOOD-style task alignment: 3 lightweight interaction layers, 64 hidden channels.
  - [[20, 23, 26], 1, THeadLiteDetect, [nc, 3, 64]]
