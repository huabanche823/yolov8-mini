# YOLO11n + GRN4 backbone + hierarchical MSBlock-Lite P4/P5 neck
# + THead-Lite Direct. The MSBlock branches use progressive cross-branch
# aggregation instead of the older parallel-only project implementation.

nc: 5
scales:
  # [depth, width, max_channels]
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

backbone:
  - [-1, 1, Conv, [64, 3, 2]] # 0-P1/2
  - [-1, 1, Conv, [128, 3, 2]] # 1-P2/4
  - [-1, 2, C3k2, [256, False, 0.25]] # 2-P2/4
  - [-1, 1, GRNBlock, [256]] # 3-GRN-P2
  - [-1, 1, Conv, [256, 3, 2]] # 4-P3/8
  - [-1, 2, C3k2, [512, False, 0.25]] # 5-P3/8
  - [-1, 1, GRNBlock, [512]] # 6-GRN-P3
  - [-1, 1, Conv, [512, 3, 2]] # 7-P4/16
  - [-1, 2, C3k2, [512, True]] # 8-P4/16
  - [-1, 1, GRNBlock, [512]] # 9-GRN-P4
  - [-1, 1, Conv, [1024, 3, 2]] # 10-P5/32
  - [-1, 2, C3k2, [1024, True]] # 11-P5/32
  - [-1, 1, GRNBlock, [1024]] # 12-GRN-P5
  - [-1, 1, SPPF, [1024, 5]] # 13
  - [-1, 2, C2PSA, [1024]] # 14

head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 9], 1, Concat, [1]] # cat GRN-P4
  - [-1, 2, C3k2, [512, False]] # 17 top-down P4
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 6], 1, Concat, [1]] # cat GRN-P3
  - [-1, 2, C3k2, [256, False]] # 20-P3
  - [-1, 1, Conv, [256, 3, 2]]
  - [[-1, 17], 1, Concat, [1]]
  - [-1, 2, C3k2_MSBlockLite, [512, False]] # 23-P4
  - [-1, 1, Conv, [512, 3, 2]]
  - [[-1, 14], 1, Concat, [1]]
  - [-1, 2, C3k2_MSBlockLite, [1024, True]] # 26-P5
  - [[20, 23, 26], 1, THeadLiteDirectDetect, [nc, 3, 64]]
