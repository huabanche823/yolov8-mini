# Ultralytics YOLO11 object detection model with GCBlock backbone + less-fusion neck.
#
# WasteSortingv3 ablation:
# - Keeps GCBlock after P3/P4 backbone C3k2.
# - Removes the strong P5->P4 top-down concat fusion.
# - Refines P4 from the GC-enhanced P4 feature itself, then fuses P4->P3 and bottom-up PAN as usual.
# - Goal: reduce cross-level misalignment/noise injection while keeping a lightweight neck.

nc: 5
scales:
  # [depth, width, max_channels]
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

backbone:
  # [from, repeats, module, args]
  - [-1, 1, Conv, [64, 3, 2]] # 0-P1/2
  - [-1, 1, Conv, [128, 3, 2]] # 1-P2/4
  - [-1, 2, C3k2, [256, False, 0.25]]
  - [-1, 1, Conv, [256, 3, 2]] # 3-P3/8
  - [-1, 2, C3k2, [512, False, 0.25]] # 4-P3/8
  - [-1, 1, GCBlock, [512]] # 5-GC-P3
  - [-1, 1, Conv, [512, 3, 2]] # 6-P4/16
  - [-1, 2, C3k2, [512, True]] # 7-P4/16
  - [-1, 1, GCBlock, [512]] # 8-GC-P4
  - [-1, 1, Conv, [1024, 3, 2]] # 9-P5/32
  - [-1, 2, C3k2, [1024, True]] # 10
  - [-1, 1, SPPF, [1024, 5]] # 11
  - [-1, 2, C2PSA, [1024]] # 12-P5/32

head:
  # P4 self-refinement: less P5 semantic injection into P4
  - [8, 2, C3k2, [512, False]] # 13

  # P4 -> P3: original P3 fusion, but driven by refined P4 instead of P5-injected P4
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]] # 14
  - [[-1, 5], 1, Concat, [1]] # 15 cat GC-P3
  - [-1, 2, C3k2, [256, False]] # 16 (P3/8-small)

  # P3 -> P4: original bottom-up PAN
  - [-1, 1, Conv, [256, 3, 2]] # 17
  - [[-1, 13], 1, Concat, [1]] # 18 cat refined P4
  - [-1, 2, C3k2, [512, False]] # 19 (P4/16-medium)

  # P4 -> P5: original bottom-up PAN to preserve high-level semantics
  - [-1, 1, Conv, [512, 3, 2]] # 20
  - [[-1, 12], 1, Concat, [1]] # 21 cat backbone P5
  - [-1, 2, C3k2, [1024, True]] # 22 (P5/32-large)

  - [[16, 19, 22], 1, Detect, [nc]] # Detect(P3, P4, P5)
