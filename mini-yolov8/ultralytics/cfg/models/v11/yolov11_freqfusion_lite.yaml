# Ultralytics YOLO11 object detection model with FreqFusion-lite neck.
#
# Backbone and Detect head type are unchanged. Only neck fusion is replaced by
# lightweight frequency-aware fusion between adjacent pyramid levels.

nc: 5
scales:
  # [depth, width, max_channels]
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

backbone:
  # [from, repeats, module, args]
  - [-1, 1, Conv, [64, 3, 2]] # 0-P1/2
  - [-1, 1, Conv, [128, 3, 2]] # 1-P2/4
  - [-1, 2, C3k2, [256, False, 0.25]] # 2
  - [-1, 1, Conv, [256, 3, 2]] # 3-P3/8
  - [-1, 2, C3k2, [512, False, 0.25]] # 4-P3/8
  - [-1, 1, Conv, [512, 3, 2]] # 5-P4/16
  - [-1, 2, C3k2, [512, True]] # 6-P4/16
  - [-1, 1, Conv, [1024, 3, 2]] # 7-P5/32
  - [-1, 2, C3k2, [1024, True]] # 8-P5/32
  - [-1, 1, SPPF, [1024, 5]] # 9
  - [-1, 2, C2PSA, [1024]] # 10

head:
  # Top-down: P5 -> P4 with frequency-aware fusion
  - [[10, 6], 1, FreqFusionLite, [512, 8]] # 11
  - [-1, 2, C3k2, [512, False]] # 12, P4 top-down

  # Top-down: P4 -> P3 with frequency-aware fusion
  - [[-1, 4], 1, FreqFusionLite, [256, 8]] # 13
  - [-1, 2, C3k2, [256, False]] # 14, P3/8-small

  # Bottom-up: P3 -> P4
  - [-1, 1, Conv, [256, 3, 2]] # 15
  - [[-1, 12], 1, FreqFusionLite, [512, 8]] # 16
  - [-1, 2, C3k2, [512, False]] # 17, P4/16-medium

  # Bottom-up: P4 -> P5
  - [-1, 1, Conv, [512, 3, 2]] # 18
  - [[-1, 10], 1, FreqFusionLite, [1024, 8]] # 19
  - [-1, 2, C3k2, [1024, True]] # 20, P5/32-large

  - [[14, 17, 20], 1, Detect, [nc]] # Detect(P3, P4, P5)
